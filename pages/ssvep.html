<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>脑电图像重建机器人控制</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">脑电图像重建机器人控制</div>
        <div class="brand__sub">EEG 采集 -> 图像重构 -> 场景识别 -> 家居控制顺序执行</div>
      </div>

      <div class="topbar__actions">
        <a href="../index.html" class="btn" style="text-decoration: none; line-height: 1;">首页</a>
        <a href="./emotional.html" class="btn" style="text-decoration: none; line-height: 1;">情感检测</a>
        <a href="./mi-smart-home.html" class="btn" style="text-decoration: none; line-height: 1;">运动想象</a>
        <a href="./voice.html" class="btn" style="text-decoration: none; line-height: 1;">语音交互</a>
      </div>
    </header>

    <main class="layout ssvep-layout">
      <section class="panel ssvep-targets-panel">
        <h2 class="panel__title">脑电图像重构示意图</h2>
        <div class="reconstruction-hero">
          <div class="reconstruction-hero__copy">
            <div class="row">
              <button id="btnStartStop" class="btn btn--primary" type="button">开始模拟</button>
              <button id="btnStop" class="btn" type="button">停止</button>
            </div>
          </div>
        </div>
        <div class="group">
          <div class="group__title">重构图像选择</div>
          <div class="group__desc">点击下方图像，模拟脑电图像重构后的场景识别与智能家居联动控制。</div>
          <div id="sceneGrid" class="scene-grid" aria-label="场景图片选择"></div>
          <div id="selectedOrder" class="selected-order">当前识别场景：未选择</div>
        </div>
      </section>

      <aside class="panel panel--side">
        <h2 class="panel__title">状态面板</h2>

        <div class="group">
          <div class="group__title">运行状态</div>
          <div class="status">
            <div class="status__row">
              <span class="status__k">流程</span>
              <span id="stimState" class="status__v">未开始</span>
            </div>
            <div class="status__row">
              <span class="status__k">最近执行</span>
              <span id="lastAction" class="status__v">—</span>
            </div>
          </div>
        </div>

        <div class="group">
          <div class="group__title">解码结果</div>
          <div class="decode-card">
            <div class="decode-card__state" id="decodeState">等待开始</div>
            <div class="decode-card__scene" id="decodeScene">未选择场景</div>
            <div class="decode-card__meta" id="decodeMeta">类型：— | 时间：—</div>
            <div class="decode-card__confidence" id="decodeConfidence">置信度：0%</div>
          </div>
        </div>

        <div class="group">
          <div class="group__title">连续指令队列</div>
          <div id="commandQueue" class="command-queue"></div>
          <div id="signalCaption" class="group__desc">等待选择重构图像。</div>
        </div>
      </aside>
    </main>


    <script src="../assets/js/app.js"></script>
  </body>
</html>
